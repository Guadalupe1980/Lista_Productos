<!doctype html>
<html lang="en" class="">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="./style.css">
  <script type="module" src="./scripts/cardBucle.js"></script>
  <script type="module" src="./scripts/filterPostres.js"></script>
  <script type="module" src="./scripts/darkmode.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lista-productos</title>
</head>

<body class="bg-[#fcf8f5] dark:bg-gray-300 transition-colors duration-300 ease-in-out">
  <!--ENCABEZADO-->
  <header class="bg-gray-100 pb-10 mb-8 shadow dark:bg-gray-300 transition-colors duration-300 ease-in-out">
    <div class="flex justify-between items-center pr-15 lg:pr-20 ">
      <h1 class="text-4xl font-bold text-stone-900 ml-20 mb-5 mt-5">Desserts</h1>
      <button id="btn-dark" class="bg-white p-2 shadow rounded-full hover:bg-gray-300 border border-yellow-300">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 20 20">
          <path fill="currentColor" fill-rule="evenodd"
            d="M7.455 2.004a.75.75 0 0 1 .26.77a7 7 0 0 0 9.958 7.967a.75.75 0 0 1 1.067.853A8.5 8.5 0 1 1 6.647 1.921a.75.75 0 0 1 .808.083"
            clip-rule="evenodd" />
        </svg>
      </button>
    </div>

    <!--APARTADO DE BUSQUEDA-->
    <div class="flex justify-between gap-5 dark:bg-gray-300 transition-colors duration-300 ease-in-out">
      <div class="relative">
      <svg class="absolute left-20 top-1/2 pl-1 -translate-y-1/2  text-gray-200 pointer-events-none" xmlns="http://www.w3.org/2000/svg" width="32" height="32"
        viewBox="0 0 20 20">
        <g fill="currentColor">
          <path d="M6.5 9a2.5 2.5 0 1 1 5 0a2.5 2.5 0 0 1-5 0" />
          <path fill-rule="evenodd"
            d="M10 18a8 8 0 1 0 0-16a8 8 0 0 0 0 16M9 5a4 4 0 1 0 2.248 7.309l1.472 1.471a.75.75 0 1 0 1.06-1.06l-1.471-1.472A4 4 0 0 0 9 5"
            clip-rule="evenodd" />
        </g>
      </svg>
      <input class="bg-white shadow rounded-md p-2 pl-9 lg:pl-9 lg:ml-20 lg:w-80 ml-20 w-40 focus:outline-none dark:border border-gray-500" id="buscarProductos" type="text"
        placeholder="Search for cakes">
        </div>

      <!--APARTADO DE SELECCION-->
      <select id="selectCakes" class="text-gray-600 mr-20 rounded-md w-35 shadow dark:border dark:border-gary-500 ">
        <option value="Todas">Todas</option>
        <option value="Waffle">Waffle</option>
        <option value="Crème Brûlée">Crème Brûlée</option>
        <option value="Macaron">Macaron</option>
        <option value="Tiramisu">Tiramisu</option>
        <option value="Baklava">Baklava</option>
        <option value="Pie">Pie</option>
        <option value="Cake">Cake</option>
        <option value="Brownie">Brownie</option>
        <option value="Panna Cotta">Panna Cotta</option>
      </select>
    </div>

  </header>

  <!--CONTENEDOR DE LAS TARJETAS DE LOS PRODUCTOS-->
  <main class="flex flex-col justify-center items-center lg:flex-row lg:items-start gap-8 pl-20 pr-20">
    <section id="content-tarjeta" class="flex-1 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-6 gap-y-10">
    </section>

    <!--CONTENIDO DE FINAL-->
    <aside class="bg-white p-6 mb-10 rounded-md w-full max-w-90 flex flex-col items-center mt-6 shadow">
      <h2 class="w-full text-2xl text-orange-700 font-bold mb-8">Your Cart (0)</h2>
      <divc class="flex flex-col gap-4 py-4">
        <img src="./assets//images/illustration-empty-cart.svg" alt="logo_carrito"
          class="w-40 h-45 object-contain mx-auto">
        <p class="text-[#887372] font-medium text-center">Your added items will appear here</p>
        </div>
    </aside>

  </main>
</body>

</html>
